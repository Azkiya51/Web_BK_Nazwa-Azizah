<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poster & Booklet | BK-Care</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #3498db;
            --secondary: #2ecc71;
            --dark: #2c3e50;
            --light: #f4f7f6;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--light);
            color: var(--dark);
        }

        /* Navbar */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 8%;
            background: white;
            box-shadow: 0 2px 15px rgba(0,0,0,0.06);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--primary);
            text-decoration: none;
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--dark);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
            padding: 8px 16px;
            border-radius: 8px;
            transition: 0.2s;
            background: var(--light);
            border: none;
            cursor: pointer;
        }

        .back-btn:hover { background: #dce9f5; color: var(--primary); }

        /* Hero */
        .hero-section {
            background: linear-gradient(135deg, #e0f2fe 0%, #f4f7f6 60%, #e8f8f0 100%);
            text-align: center;
            padding: 60px 20px 50px;
        }

        .hero-section .tag {
            display: inline-block;
            background: #ebf5fb;
            border: 1px solid #b3d7f0;
            color: var(--primary);
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 6px 18px;
            border-radius: 30px;
            margin-bottom: 16px;
        }

        .hero-section h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 12px;
        }

        .hero-section h1 span { color: var(--primary); }

        .hero-section p {
            color: #666;
            font-size: 0.95rem;
            max-width: 500px;
            margin: auto;
        }

        /* Tab Filter */
        .tab-container {
            max-width: 1100px;
            margin: 40px auto 0;
            padding: 0 20px;
        }

        .tab-buttons {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 10px 28px;
            border-radius: 50px;
            border: 2px solid #ddd;
            background: white;
            color: #666;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.25s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tab-btn:hover { border-color: var(--primary); color: var(--primary); }

        .tab-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }

        .tab-btn .count-badge {
            background: rgba(255,255,255,0.3);
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 20px;
            min-width: 20px;
            text-align: center;
        }

        .tab-btn.active .count-badge { background: rgba(255,255,255,0.3); }
        .tab-btn:not(.active) .count-badge { background: #f0f0f0; color: #999; }

        /* Grid Media */
        .media-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
            padding-bottom: 80px;
        }

        .media-card {
            background: white;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.07);
            transition: 0.3s;
            animation: fadeUp 0.4s ease forwards;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .media-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 35px rgba(0,0,0,0.12);
        }

        .media-img-wrap {
            position: relative;
            aspect-ratio: 3/4;
            overflow: hidden;
            background: #f0f0f0;
            cursor: pointer;
        }

        .media-img-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
        }

        .media-card:hover .media-img-wrap img { transform: scale(1.04); }

        .media-type-badge {
            position: absolute;
            top: 12px;
            left: 12px;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .badge-poster { background: #3498db; color: white; }
        .badge-booklet { background: #2ecc71; color: white; }

        .media-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: 0.3s;
        }

        .media-card:hover .media-overlay { opacity: 1; }

        .overlay-icon {
            width: 52px;
            height: 52px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            color: var(--primary);
        }

        .media-info {
            padding: 18px 20px 20px;
        }

        .media-info h3 {
            font-size: 1rem;
            font-weight: 600;
            color: var(--dark);
            margin-bottom: 6px;
            line-height: 1.3;
        }

        .media-info p {
            font-size: 0.82rem;
            color: #888;
            line-height: 1.5;
            margin-bottom: 14px;
        }

        .media-actions {
            display: flex;
            gap: 8px;
        }

        .btn-view {
            flex: 1;
            padding: 9px;
            background: #ebf5fb;
            color: var(--primary);
            border: none;
            border-radius: 10px;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 0.82rem;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            text-decoration: none;
        }

        .btn-view:hover { background: var(--primary); color: white; }

        .btn-download {
            padding: 9px 14px;
            background: #e8f8f0;
            color: var(--secondary);
            border: none;
            border-radius: 10px;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 0.82rem;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
        }

        .btn-download:hover { background: var(--secondary); color: white; }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: #bbb;
            grid-column: 1 / -1;
        }

        .empty-state i { font-size: 3rem; margin-bottom: 16px; display: block; }
        .empty-state h3 { font-size: 1.1rem; color: #999; margin-bottom: 8px; }
        .empty-state p { font-size: 0.88rem; }

        /* Skeleton */
        .skeleton-card {
            background: white;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.04);
        }

        .skeleton-img {
            aspect-ratio: 3/4;
            background: linear-gradient(90deg, #f0f0f0 25%, #e8e8e8 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }

        .skeleton-text {
            padding: 18px 20px;
        }

        .skeleton-line {
            height: 12px;
            border-radius: 6px;
            background: linear-gradient(90deg, #f0f0f0 25%, #e8e8e8 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            margin-bottom: 10px;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* Lightbox */
        .lightbox {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.2s ease;
            padding: 20px;
        }

        .lightbox.show { display: flex; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .lightbox-inner {
            position: relative;
            max-width: 600px;
            width: 100%;
        }

        .lightbox-inner img {
            width: 100%;
            max-height: 85vh;
            object-fit: contain;
            border-radius: 12px;
        }

        .lightbox-close {
            position: absolute;
            top: -16px;
            right: -16px;
            width: 40px;
            height: 40px;
            background: white;
            border: none;
            border-radius: 50%;
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }

        .lightbox-close:hover { background: #f0f0f0; transform: scale(1.1); }

        .lightbox-caption {
            text-align: center;
            color: rgba(255,255,255,0.8);
            margin-top: 12px;
            font-size: 0.9rem;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .hero-section h1 { font-size: 1.8rem; }
            .media-grid { grid-template-columns: repeat(2, 1fr); gap: 14px; }
            .navbar { padding: 15px 5%; }
        }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
    <a href="/" class="logo"><i class="fas fa-heart-pulse"></i> BK-Care</a>
    <a href="/" class="back-btn"><i class="fas fa-arrow-left"></i> Kembali</a>
</nav>

<!-- Hero -->
<div class="hero-section">
    <div class="tag">📚 Media Edukasi</div>
    <h1>Poster & <span>Booklet</span></h1>
    <p>Kumpulan materi edukasi kesehatan mental dan bimbingan konseling dari Guru BK.</p>
</div>

<!-- Tab + Grid -->
<div class="tab-container">
    <div class="tab-buttons">
        <button class="tab-btn active" onclick="filterMedia('semua')" id="tab-semua">
            <i class="fas fa-th"></i> Semua
            <span class="count-badge" id="count-semua">0</span>
        </button>
        <button class="tab-btn" onclick="filterMedia('poster')" id="tab-poster">
            <i class="fas fa-image"></i> Poster
            <span class="count-badge" id="count-poster">0</span>
        </button>
        <button class="tab-btn" onclick="filterMedia('booklet')" id="tab-booklet">
            <i class="fas fa-book-open"></i> Booklet
            <span class="count-badge" id="count-booklet">0</span>
        </button>
    </div>

    <div class="media-grid" id="mediaGrid">
        <!-- Skeleton loading -->
        <div class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-text"><div class="skeleton-line" style="width:70%"></div><div class="skeleton-line" style="width:50%"></div></div></div>
        <div class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-text"><div class="skeleton-line" style="width:80%"></div><div class="skeleton-line" style="width:40%"></div></div></div>
        <div class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-text"><div class="skeleton-line" style="width:60%"></div><div class="skeleton-line" style="width:55%"></div></div></div>
    </div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
    <div class="lightbox-inner">
        <button class="lightbox-close" onclick="closeLightbox()"><i class="fas fa-times"></i></button>
        <img src="" id="lightboxImg" alt="">
        <div class="lightbox-caption" id="lightboxCaption"></div>
    </div>
</div>


<!-- Supabase CDN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script>
    let allMedia = [];
    let currentFilter = 'semua';

    async function loadMedia() {
        try {
            const { data, error } = await db
                .from('media')
                .select('*')
                .order('created_at', { ascending: false });
            if (error) throw error;

            allMedia = data || [];
            updateCounts();
            renderMedia(allMedia);
        } catch (e) {
            document.getElementById('mediaGrid').innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-exclamation-circle" style="color:#e74c3c"></i>
                    <h3>Gagal memuat data</h3>
                    <p>Coba muat ulang halaman. (${e.message})</p>
                </div>`;
        }
    }

    function updateCounts() {
        const posters = allMedia.filter(m => m.type === 'poster').length;
        const booklets = allMedia.filter(m => m.type === 'booklet').length;
        document.getElementById('count-semua').textContent = allMedia.length;
        document.getElementById('count-poster').textContent = posters;
        document.getElementById('count-booklet').textContent = booklets;
    }

    function filterMedia(type) {
        currentFilter = type;
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById('tab-' + type).classList.add('active');
        const filtered = type === 'semua' ? allMedia : allMedia.filter(m => m.type === type);
        renderMedia(filtered);
    }

    function renderMedia(data) {
        const grid = document.getElementById('mediaGrid');
        if (data.length === 0) {
            grid.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-folder-open"></i>
                    <h3>Belum ada konten</h3>
                    <p>Admin belum menambahkan ${currentFilter === 'semua' ? 'media' : currentFilter} apapun.</p>
                </div>`;
            return;
        }
        grid.innerHTML = '';
        data.forEach((item, i) => {
            const card = document.createElement('div');
            card.className = 'media-card';
            card.style.animationDelay = (i * 0.06) + 's';
            card.style.opacity = '0';
            const hasFile = item.file_url && item.file_url.trim() !== '';
            card.innerHTML = `
                <div class="media-img-wrap" onclick="openLightbox('${item.image_url}', '${escapeHtml(item.judul)}')">
                    <img src="${item.image_url}" alt="${escapeHtml(item.judul)}" loading="lazy"
                         onerror="this.src='https://via.placeholder.com/300x400?text=Gambar+Tidak+Tersedia'">
                    <span class="media-type-badge badge-${item.type}">${item.type}</span>
                    <div class="media-overlay">
                        <div class="overlay-icon"><i class="fas fa-search-plus"></i></div>
                    </div>
                </div>
                <div class="media-info">
                    <h3>${escapeHtml(item.judul)}</h3>
                    ${item.deskripsi ? `<p>${escapeHtml(item.deskripsi)}</p>` : ''}
                    <div class="media-actions">
                        <button class="btn-view" onclick="openLightbox('${item.image_url}', '${escapeHtml(item.judul)}')">
                            <i class="fas fa-eye"></i> Lihat
                        </button>
                        ${hasFile ? `<a href="${item.file_url}" target="_blank" class="btn-download"><i class="fas fa-download"></i> Unduh</a>` : ''}
                    </div>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    function escapeHtml(text) {
        if (!text) return '';
        return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
    }

    function openLightbox(imgUrl, caption) {
        document.getElementById('lightboxImg').src = imgUrl;
        document.getElementById('lightboxCaption').textContent = caption;
        document.getElementById('lightbox').classList.add('show');
        document.body.style.overflow = 'hidden';
    }

    function closeLightbox(event) {
        if (event && event.target !== document.getElementById('lightbox') && !event.target.closest('.lightbox-close')) return;
        document.getElementById('lightbox').classList.remove('show');
        document.body.style.overflow = '';
    }

    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') {
            document.getElementById('lightbox').classList.remove('show');
            document.body.style.overflow = '';
        }
    });

    // Catat kunjungan → Supabase
    async function recordView() {
        try {
            const key = 'view_recorded_/media';
            if (sessionStorage.getItem(key)) return;
            await db.from('page_views').insert([{
                ip_address: 'client',
                user_agent: navigator.userAgent,
                page: '/media',
                visited_at: new Date().toISOString()
            }]);
            sessionStorage.setItem(key, '1');
        } catch(e) {}
    }

    loadMedia();
    recordView();
</script>

</body>
</html>
