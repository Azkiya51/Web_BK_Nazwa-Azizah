<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Guru BK | BK-Care</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="dashboard-container">
    <header>
        <h2><i class="fas fa-chalkboard-teacher"></i> Dashboard Guru BK</h2>
        <div class="header-actions">
            <button class="btn-back" onclick="window.location.href='index.html'">
                <i class="fas fa-arrow-left"></i> Kembali
            </button>
            <button class="btn-refresh" onclick="loadAduan()">
                <i class="fas fa-sync"></i> Refresh Data
            </button>
        </div>
    </header>

    <!-- Stats Row -->
    <div class="stats-row">
        <div class="stat-card total">
            <div class="icon"><i class="fas fa-inbox"></i></div>
            <div class="info">
                <div class="num" id="statTotal">-</div>
                <div class="label">Total Aduan</div>
            </div>
        </div>
        <div class="stat-card tinggi">
            <div class="icon"><i class="fas fa-exclamation-circle"></i></div>
            <div class="info">
                <div class="num" id="statTinggi">-</div>
                <div class="label">Urgensi Tinggi</div>
            </div>
        </div>
        <div class="stat-card sedang">
            <div class="icon"><i class="fas fa-exclamation-triangle"></i></div>
            <div class="info">
                <div class="num" id="statSedang">-</div>
                <div class="label">Urgensi Sedang</div>
            </div>
        </div>
        <div class="stat-card rendah">
            <div class="icon"><i class="fas fa-comment-dots"></i></div>
            <div class="info">
                <div class="num" id="statRendah">-</div>
                <div class="label">Urgensi Rendah</div>
            </div>
        </div>
    </div>

    <!-- Table -->
    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>Waktu</th>
                    <th>Mode</th>
                    <th>Nama / NIS</th>
                    <th>Urgensi</th>
                    <th>Isi Aduan</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody id="aduanTableBody">
                <tr class="empty-row">
                    <td colspan="6"><i class="fas fa-spinner fa-spin"></i> Memuat data...</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Supabase CDN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script>
    async function loadAduan() {
        const tableBody = document.getElementById('aduanTableBody');
        tableBody.innerHTML = '<tr class="empty-row"><td colspan="6"><i class="fas fa-spinner fa-spin"></i> Memuat data...</td></tr>';

        try {
            const { data, error } = await db
                .from('konseling')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) throw error;

            // Update stats
            document.getElementById('statTotal').textContent = data.length;
            document.getElementById('statTinggi').textContent = data.filter(d => d.urgensi === 'tinggi').length;
            document.getElementById('statSedang').textContent = data.filter(d => d.urgensi === 'sedang').length;
            document.getElementById('statRendah').textContent = data.filter(d => d.urgensi === 'rendah').length;

            if (data.length === 0) {
                tableBody.innerHTML = `
                    <tr class="empty-row">
                        <td colspan="6">
                            <i class="fas fa-inbox"></i>
                            Belum ada aduan masuk.
                        </td>
                    </tr>`;
                return;
            }

            tableBody.innerHTML = '';
            data.forEach(item => {
                const date = new Date(item.created_at).toLocaleString('id-ID', {
                    day: 'numeric', month: 'short', year: 'numeric',
                    hour: '2-digit', minute: '2-digit'
                });
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td style="white-space:nowrap;font-size:0.8rem;color:#888">${date}</td>
                    <td>
                        <span class="mode-icon">${item.mode === 'anonim' ? '👤' : '🎓'}</span>
                        ${item.mode}
                    </td>
                    <td>
                        <strong>${item.nama}</strong><br>
                        <small style="color:#aaa">${item.nis || '-'}</small>
                    </td>
                    <td>
                        <span class="badge urgensi-${item.urgensi}">${item.urgensi}</span>
                    </td>
                    <td><div class="aduan-text">${item.aduan}</div></td>
                    <td>
                        <button class="btn-delete" onclick="deleteAduan(${item.id})">
                            <i class="fas fa-trash"></i>
                        </button>
                    </td>
                `;
                tableBody.appendChild(row);
            });
        } catch (error) {
            tableBody.innerHTML = `
                <tr class="empty-row">
                    <td colspan="6" style="color:red">
                        <i class="fas fa-exclamation-circle"></i>
                        Gagal mengambil data: ${error.message}
                    </td>
                </tr>`;
        }
    }

    async function deleteAduan(id) {
        if (!confirm('Apakah Anda yakin ingin menghapus aduan ini?')) return;
        try {
            const { error } = await db.from('konseling').delete().eq('id', id);
            if (error) throw error;
            alert('Aduan berhasil dihapus.');
            loadAduan();
        } catch (error) {
            alert('Gagal menghapus aduan: ' + error.message);
        }
    }

    window.onload = loadAduan;
</script>
</body>
</html>
