<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Guru BK | BK-Care</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #3498db;
            --dark: #2c3e50;
            --danger: #e74c3c;
            --warning: #f1c40f;
            --success: #2ecc71;
        }
        body { font-family: 'Poppins', sans-serif; background: #f4f7f6; margin: 0; padding: 20px; }
        .dashboard-container { max-width: 1200px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 2px solid #eee; padding-bottom: 20px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: var(--primary); color: white; }
        
        .badge { padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; }
        .urgensi-tinggi { background: #ffdada; color: var(--danger); }
        .urgensi-sedang { background: #fff4d1; color: #a98600; }
        .urgensi-rendah { background: #d5f5e3; color: var(--success); }
        
        .btn-delete { color: var(--danger); cursor: pointer; border: none; background: none; font-size: 1.1rem; }
        .btn-refresh { background: var(--primary); color: white; padding: 10px 20px; border-radius: 5px; border: none; cursor: pointer; }
        
        tr:hover { background: #f9f9f9; }
        .mode-icon { margin-right: 8px; }
    </style>
</head>
<body>

<div class="dashboard-container">
    <header>
        <h2><i class="fas fa-chalkboard-teacher"></i> Dashboard Guru BK</h2>
        <button class="btn-refresh" onclick="loadAduan()"><i class="fas fa-sync"></i> Refresh Data</button>
    </header>

    <table>
        <thead>
            <tr>
                <th>Waktu</th>
                <th>Mode</th>
                <th>Nama / NIS</th>
                <th>Urgensi</th>
                <th>Isi Aduan</th>
                <th>Aksi</th>
            </tr>
        </thead>
        <tbody id="aduanTableBody">
            </tbody>
    </table>
</div>

<script>
    async function loadAduan() {
        const tableBody = document.getElementById('aduanTableBody');
        tableBody.innerHTML = '<tr><td colspan="6" style="text-align:center">Memuat data...</td></tr>';

        try {
            const response = await fetch('/api/konseling');
            const data = await response.json();

            tableBody.innerHTML = ''; // Bersihkan loading

            data.forEach(item => {
                const date = new Date(item.created_at).toLocaleString('id-ID');
                const row = document.createElement('tr');
                
                row.innerHTML = `
                    <td>${date}</td>
                    <td>
                        <span class="mode-icon">${item.mode === 'anonim' ? '👤' : '🎓'}</span>
                        ${item.mode}
                    </td>
                    <td>
                        <strong>${item.nama}</strong><br>
                        <small>${item.nis ? item.nis : '-'}</small>
                    </td>
                    <td>
                        <span class="badge urgensi-${item.urgensi}">${item.urgensi}</span>
                    </td>
                    <td>${item.aduan}</td>
                    <td>
                        <button class="btn-delete" onclick="deleteAduan(${item.id})">
                            <i class="fas fa-trash"></i>
                        </button>
                    </td>
                `;
                tableBody.appendChild(row);
            });
        } catch (error) {
            tableBody.innerHTML = '<tr><td colspan="6" style="text-align:center; color:red">Gagal mengambil data dari server.</td></tr>';
        }
    }

    async function deleteAduan(id) {
        if(confirm('Apakah Anda yakin ingin menghapus aduan ini?')) {
            try {
                await fetch(`http://localhost:3000/api/konseling/${id}`, { method: 'DELETE' });
                loadAduan(); // Refresh tabel
            } catch (error) {
                alert('Gagal menghapus data');
            }
        }
    }

    // Load data saat pertama kali buka
    window.onload = loadAduan;
</script>

</body>
</html>
