<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Guru BK | BK-Care</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #3498db;
            --secondary: #2ecc71;
            --dark: #2c3e50;
            --light: #f4f7f6;
            --danger: #e74c3c;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body { background: var(--light); color: var(--dark); }

        .dashboard-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px 60px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 12px;
        }

        header h2 {
            font-size: 1.6rem;
            color: var(--dark);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        header h2 i { color: var(--primary); }

        .header-actions { display: flex; gap: 10px; }

        .btn-refresh, .btn-back {
            padding: 10px 20px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
        }

        .btn-refresh { background: var(--primary); color: white; }
        .btn-refresh:hover { background: #2980b9; }
        .btn-back { background: white; color: var(--dark); border: 1px solid #ddd; }
        .btn-back:hover { background: var(--light); }

        /* Stats Cards */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .stat-card .icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            flex-shrink: 0;
        }

        .stat-card.total .icon { background: #ebf5fb; color: var(--primary); }
        .stat-card.tinggi .icon { background: #fdf2f2; color: var(--danger); }
        .stat-card.sedang .icon { background: #fef9e7; color: #f39c12; }
        .stat-card.rendah .icon { background: #eafaf1; color: var(--secondary); }

        .stat-card .info { flex: 1; }
        .stat-card .info .num { font-size: 1.8rem; font-weight: 700; line-height: 1; }
        .stat-card .info .label { font-size: 0.78rem; color: #888; margin-top: 4px; }

        /* Table */
        .table-wrapper {
            background: white;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            overflow: hidden;
        }

        table { width: 100%; border-collapse: collapse; }

        thead { background: linear-gradient(135deg, var(--primary), #2980b9); }
        thead th {
            padding: 16px 18px;
            text-align: left;
            color: white;
            font-size: 0.82rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        tbody tr {
            border-bottom: 1px solid #f0f0f0;
            transition: background 0.15s;
        }

        tbody tr:last-child { border-bottom: none; }
        tbody tr:hover { background: #f8fbff; }

        td {
            padding: 16px 18px;
            font-size: 0.88rem;
            color: var(--dark);
            vertical-align: middle;
        }

        .mode-icon { margin-right: 5px; }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
        }

        .urgensi-rendah { background: #eafaf1; color: #27ae60; }
        .urgensi-sedang { background: #fef9e7; color: #f39c12; }
        .urgensi-tinggi { background: #fdf2f2; color: var(--danger); }

        .btn-delete {
            background: #fdf2f2;
            color: var(--danger);
            border: none;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.85rem;
        }

        .btn-delete:hover { background: var(--danger); color: white; }

        .aduan-text {
            max-width: 280px;
            line-height: 1.5;
            color: #555;
        }

        .empty-row td {
            text-align: center;
            padding: 50px;
            color: #aaa;
        }

        .empty-row i { font-size: 2rem; display: block; margin-bottom: 10px; opacity: 0.4; }
    </style>
</head>
<body>

<div class="dashboard-container">
    <header>
        <h2><i class="fas fa-chalkboard-teacher"></i> Dashboard Guru BK</h2>
        <div class="header-actions">
            <button class="btn-back" onclick="window.location.href='index.html'">
                <i class="fas fa-arrow-left"></i> Kembali
            </button>
            <button class="btn-refresh" onclick="loadAduan()">
                <i class="fas fa-sync"></i> Refresh Data
            </button>
        </div>
    </header>

    <!-- Stats Row -->
    <div class="stats-row">
        <div class="stat-card total">
            <div class="icon"><i class="fas fa-inbox"></i></div>
            <div class="info">
                <div class="num" id="statTotal">-</div>
                <div class="label">Total Aduan</div>
            </div>
        </div>
        <div class="stat-card tinggi">
            <div class="icon"><i class="fas fa-exclamation-circle"></i></div>
            <div class="info">
                <div class="num" id="statTinggi">-</div>
                <div class="label">Urgensi Tinggi</div>
            </div>
        </div>
        <div class="stat-card sedang">
            <div class="icon"><i class="fas fa-exclamation-triangle"></i></div>
            <div class="info">
                <div class="num" id="statSedang">-</div>
                <div class="label">Urgensi Sedang</div>
            </div>
        </div>
        <div class="stat-card rendah">
            <div class="icon"><i class="fas fa-comment-dots"></i></div>
            <div class="info">
                <div class="num" id="statRendah">-</div>
                <div class="label">Urgensi Rendah</div>
            </div>
        </div>
    </div>

    <!-- Table -->
    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>Waktu</th>
                    <th>Mode</th>
                    <th>Nama / NIS</th>
                    <th>Urgensi</th>
                    <th>Isi Aduan</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody id="aduanTableBody">
                <tr class="empty-row">
                    <td colspan="6"><i class="fas fa-spinner fa-spin"></i> Memuat data...</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Supabase CDN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script>
    async function loadAduan() {
        const tableBody = document.getElementById('aduanTableBody');
        tableBody.innerHTML = '<tr class="empty-row"><td colspan="6"><i class="fas fa-spinner fa-spin"></i> Memuat data...</td></tr>';

        try {
            const { data, error } = await db
                .from('konseling')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) throw error;

            // Update stats
            document.getElementById('statTotal').textContent = data.length;
            document.getElementById('statTinggi').textContent = data.filter(d => d.urgensi === 'tinggi').length;
            document.getElementById('statSedang').textContent = data.filter(d => d.urgensi === 'sedang').length;
            document.getElementById('statRendah').textContent = data.filter(d => d.urgensi === 'rendah').length;

            if (data.length === 0) {
                tableBody.innerHTML = `
                    <tr class="empty-row">
                        <td colspan="6">
                            <i class="fas fa-inbox"></i>
                            Belum ada aduan masuk.
                        </td>
                    </tr>`;
                return;
            }

            tableBody.innerHTML = '';
            data.forEach(item => {
                const date = new Date(item.created_at).toLocaleString('id-ID', {
                    day: 'numeric', month: 'short', year: 'numeric',
                    hour: '2-digit', minute: '2-digit'
                });
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td style="white-space:nowrap;font-size:0.8rem;color:#888">${date}</td>
                    <td>
                        <span class="mode-icon">${item.mode === 'anonim' ? '👤' : '🎓'}</span>
                        ${item.mode}
                    </td>
                    <td>
                        <strong>${item.nama}</strong><br>
                        <small style="color:#aaa">${item.nis || '-'}</small>
                    </td>
                    <td>
                        <span class="badge urgensi-${item.urgensi}">${item.urgensi}</span>
                    </td>
                    <td><div class="aduan-text">${item.aduan}</div></td>
                    <td>
                        <button class="btn-delete" onclick="deleteAduan(${item.id})">
                            <i class="fas fa-trash"></i>
                        </button>
                    </td>
                `;
                tableBody.appendChild(row);
            });
        } catch (error) {
            tableBody.innerHTML = `
                <tr class="empty-row">
                    <td colspan="6" style="color:red">
                        <i class="fas fa-exclamation-circle"></i>
                        Gagal mengambil data: ${error.message}
                    </td>
                </tr>`;
        }
    }

    async function deleteAduan(id) {
        if (!confirm('Apakah Anda yakin ingin menghapus aduan ini?')) return;
        try {
            const { error } = await db.from('konseling').delete().eq('id', id);
            if (error) throw error;
            alert('Aduan berhasil dihapus.');
            loadAduan();
        } catch (error) {
            alert('Gagal menghapus aduan: ' + error.message);
        }
    }

    window.onload = loadAduan;
</script>
</body>
</html>
