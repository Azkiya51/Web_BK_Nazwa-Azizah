<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Guru BK | BK-Care</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/css/admin.css">
</head>
<body>

<div class="dashboard-container">
    <header>
        <h2><i class="fas fa-chalkboard-teacher"></i> Dashboard Guru BK</h2>
        <button class="btn-refresh" onclick="loadAduan()"><i class="fas fa-sync"></i> Refresh Data</button>
    </header>

    <table>
        <thead>
            <tr>
                <th>Waktu</th>
                <th>Mode</th>
                <th>Nama / NIS</th>
                <th>Urgensi</th>
                <th>Isi Aduan</th>
                <th>Aksi</th>
            </tr>
        </thead>
        <tbody id="aduanTableBody">
            </tbody>
    </table>
</div>

<script>
    async function loadAduan() {
        const tableBody = document.getElementById('aduanTableBody');
        tableBody.innerHTML = '<tr><td colspan="6" style="text-align:center">Memuat data...</td></tr>';

        try {
            const response = await fetch('/api/konseling');
            const data = await response.json();

            tableBody.innerHTML = ''; // Bersihkan loading

            data.forEach(item => {
                const date = new Date(item.created_at).toLocaleString('id-ID');
                const row = document.createElement('tr');
                
                row.innerHTML = `
                    <td>${date}</td>
                    <td>
                        <span class="mode-icon">${item.mode === 'anonim' ? '👤' : '🎓'}</span>
                        ${item.mode}
                    </td>
                    <td>
                        <strong>${item.nama}</strong><br>
                        <small>${item.nis ? item.nis : '-'}</small>
                    </td>
                    <td>
                        <span class="badge urgensi-${item.urgensi}">${item.urgensi}</span>
                    </td>
                    <td>${item.aduan}</td>
                    <td>
                        <button class="btn-delete" onclick="deleteAduan(${item.id})">
                            <i class="fas fa-trash"></i>
                        </button>
                    </td>
                `;
                tableBody.appendChild(row);
            });
        } catch (error) {
            tableBody.innerHTML = '<tr><td colspan="6" style="text-align:center; color:red">Gagal mengambil data dari server.</td></tr>';
        }
    }

    async function deleteAduan(id) {
        if(confirm('Apakah Anda yakin ingin menghapus aduan ini?')) {
            try {
                const response = await fetch(`/api/konseling/${id}`, { method: 'DELETE' });
                if(response.ok) {
                    alert('Aduan berhasil dihapus.');
                    loadAduan(); // Refresh data setelah hapus
                } else {
                    alert('Gagal menghapus aduan. Silakan coba lagi.');
                }
            } catch (error) {
                alert('Terjadi kesalahan saat menghapus aduan.');
            }
        }
    }

    // Load data saat pertama kali buka
    window.onload = loadAduan;
</script>

</body>
</html>
